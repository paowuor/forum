<!DOCTYPE html>
<html>
<head><title>New Post</title></head>
<body>
  <nav>
    <a href="/">Home</a> — Logged in as {{.User.Username}}
  </nav>
  <hr>
  <h1>New Post</h1>
  <form method="POST" action="/posts">
    <label>Title: <input type="text" name="title" required></label><br>
    <label>Content:<br>
      <textarea name="content" rows="6" cols="50" required></textarea>
    </label><br>
    <fieldset>
      <legend>Categories</legend>
      {{range .Categories}}
        <label>
          <input type="checkbox" name="categories" value="{{.ID}}"> {{.Name}}
        </label><br>
      {{end}}
    </fieldset>
    <button type="submit">Post</button>
  </form>
</body>
</html>
